<!DOCTYPE html>
<!-- SPDX-License-Identifier: Apache-2.0
     UnitedAV WebGPU backend verifier. Decodes a clip in an HTMLVideoElement and
     produces an RGBA GPUTexture three ways, then checks each vs the browser's own
     <video> presentation (2D-canvas drawImage) + an ffmpeg oracle:

       mode=webcodecs (DEFAULT, correct): WebCodecs VideoFrame.copyTo -> raw Y/U/V
         planes uploaded as r8 textures -> WGSL applies the clip's signalled YUV->RGB
         matrix (BT.601/709/2020 + limited/full, same maths as the native backends).
         This is the only path that reproduces the tagged colour exactly, because
         Chromium's copyExternalImageToTexture/importExternalTexture apply their own
         (mismatched) conversion. Cost: a per-frame plane copyTo (not zero-copy).
       mode=copy     : copyExternalImageToTexture (GPU-side copy; browser conversion).
       mode=external : importExternalTexture (zero-copy; browser conversion).

     The verdict is console.log'd as "UAVRESULT ..."; the driver scrapes stderr. -->
<html><head><meta charset="utf-8"><title>PENDING</title></head>
<body style="margin:0;background:#000"><canvas id="c" width="320" height="240"></canvas>
<pre id="result">PENDING</pre>
<script>
const params = new URLSearchParams(location.search);
const CLIP = params.get('clip') || 'clip.webm';
const MODE = params.get('mode') || 'webcodecs';   // webcodecs (default) | copy | external
let W = 320, H = 240;
function done(m){ document.getElementById('result').textContent = m; document.title = m; console.log('UAVRESULT ' + m); }

function meanAbsRGB(a, b){ let s=0, mx=0; const n=W*H;
  for (let i=0;i<n;i++) for (let c=0;c<3;c++){ const d=Math.abs(a[i*4+c]-b[i*4+c]); s+=d; if(d>mx)mx=d; }
  return { mean: s/(3*n), max: mx }; }
function depad(p, bpr){ const t=new Uint8Array(W*H*4), row=W*4;
  for (let y=0;y<H;y++) t.set(p.subarray(y*bpr, y*bpr+row), y*row); return t; }

// YUV->RGB coefficients, matching egl_vaapi.cpp coeffs_for()/make_matrix().
function coeffs(matrix){ if(matrix==='bt709')return[0.2126,0.0722];
  if(matrix==='bt470bg'||matrix==='smpte170m')return[0.299,0.114];
  if(matrix==='bt2020-ncl'||matrix==='bt2020-cl')return[0.2627,0.0593];
  return H<=576?[0.299,0.114]:[0.2126,0.0722]; }
function makeMat(kr,kb,full){ const kg=1-kr-kb; let ys,yb,cs;
  if(full){ys=1;yb=0;cs=1;}else{ys=255/(235-16);yb=16/255;cs=255/(240-16);}
  return { m0:[ys,0,cs*(2-2*kr),0], m1:[ys,-cs*(2*kb*(1-kb)/kg),-cs*(2*kr*(1-kr)/kg),0],
           m2:[ys,cs*(2-2*kb),0,0], yoff:[yb,0.5,0.5,0] }; }

async function readback(device, target){
  const bpr = Math.ceil(W*4/256)*256;
  const buf = device.createBuffer({ size: bpr*H, usage: GPUBufferUsage.COPY_DST|GPUBufferUsage.MAP_READ });
  const enc = device.createCommandEncoder();
  enc.copyTextureToBuffer({ texture: target }, { buffer: buf, bytesPerRow: bpr, rowsPerImage: H }, [W,H,1]);
  device.queue.submit([enc.finish()]);
  await buf.mapAsync(GPUMapMode.READ);
  const out = depad(new Uint8Array(buf.getMappedRange()).slice(), bpr); buf.unmap(); return out;
}

async function main(){
  const v = document.createElement('video');
  v.muted = true; v.crossOrigin = 'anonymous'; v.playsInline = true; v.preload = 'auto'; v.src = CLIP;
  await new Promise((res, rej) => { v.onloadeddata = res; v.onerror = () => rej('video-load-error'); });
  // First frame WITHOUT playing, so every capture + the ffmpeg oracle is the SAME
  // frame (no temporal mismatch on moving content).
  await new Promise(r => requestAnimationFrame(() => requestAnimationFrame(r)));
  if (v.readyState < 2) { try { await v.play(); v.pause(); v.currentTime = 0; } catch(e){}
    await new Promise(r => requestAnimationFrame(() => requestAnimationFrame(r))); }
  if (v.readyState < 2) return done('FAIL video-no-data');
  W = v.videoWidth || W; H = v.videoHeight || H;
  document.getElementById('c').width = W; document.getElementById('c').height = H;

  if (!navigator.gpu) return done('FAIL no-webgpu');
  let adapter, device;
  try { adapter = await navigator.gpu.requestAdapter(); if (!adapter) return done('FAIL no-adapter');
        device = await adapter.requestDevice(); } catch (e) { return done('FAIL device ' + e); }
  const info = adapter.info || {};

  const fmt = 'rgba8unorm';
  const sampler = device.createSampler({ magFilter: 'linear', minFilter: 'linear' });
  const target = device.createTexture({ size: [W,H], format: fmt,
    usage: GPUTextureUsage.RENDER_ATTACHMENT | GPUTextureUsage.COPY_SRC });
  let bindGroup, pipeline;

  try {
    if (MODE === 'webcodecs') {
      if (typeof VideoFrame === 'undefined') return done('FAIL no-webcodecs');
      const vf = new VideoFrame(v);
      const csp = vf.colorSpace || {};
      const cw = vf.codedWidth, ch = vf.codedHeight;
      // HW-decoded frames can report format=null (GPU surface). Force I420 on copy
      // for null/unknown formats; use native copy for the known I420/NV12 layouts.
      // The colour-correct path needs the raw Y/U/V planes. HW-decoded frames hide
      // them (format=null) and copyTo can't convert TO i420 — so this verifier needs
      // a software-decoded frame (run the browser with --disable-accelerated-video-decode).
      const vfmt = vf.format;
      if (vfmt!=='I420' && vfmt!=='I420A' && vfmt!=='NV12') { vf.close();
        return done('FAIL needs-sw-decode format='+(vfmt||'null')+' (HW decode hides raw YUV; use --disable-accelerated-video-decode)'); }
      let ab, layout;
      try { ab = new ArrayBuffer(vf.allocationSize()); layout = await vf.copyTo(ab); }
      catch(e){ vf.close(); return done('FAIL copyTo-'+(vfmt||'null')+'-'+(e&&e.name?e.name:e)); }
      const u8 = new Uint8Array(ab);
      const plane = (i,pw,ph)=>{ const {offset,stride}=layout[i]; const o=new Uint8Array(pw*ph);
        for(let y=0;y<ph;y++) o.set(u8.subarray(offset+y*stride, offset+y*stride+pw), y*pw); return o; };
      let yA,uA,vA;
      if (vfmt==='I420' || vfmt==='I420A') {
        yA=plane(0,cw,ch); uA=plane(1,cw>>1,ch>>1); vA=plane(2,cw>>1,ch>>1);
      } else { // NV12
        yA=plane(0,cw,ch); const {offset,stride}=layout[1]; const cwh=cw>>1, chh=ch>>1;
        uA=new Uint8Array(cwh*chh); vA=new Uint8Array(cwh*chh);
        for(let y=0;y<chh;y++)for(let x=0;x<cwh;x++){const s=offset+y*stride+x*2; uA[y*cwh+x]=u8[s]; vA[y*cwh+x]=u8[s+1];}
      }
      vf.close();
      const mk=(d,pw,ph)=>{ const t=device.createTexture({ size:[pw,ph], format:'r8unorm',
        usage:GPUTextureUsage.TEXTURE_BINDING|GPUTextureUsage.COPY_DST });
        device.queue.writeTexture({texture:t}, d, {bytesPerRow:pw, rowsPerImage:ph}, [pw,ph]); return t; };
      const tY=mk(yA,cw,ch), tU=mk(uA,cw>>1,ch>>1), tV=mk(vA,cw>>1,ch>>1);
      const [kr,kb]=coeffs(csp.matrix); const cm=makeMat(kr,kb,!!csp.fullRange);
      const cbuf=device.createBuffer({ size:64, usage:GPUBufferUsage.UNIFORM|GPUBufferUsage.COPY_DST });
      device.queue.writeBuffer(cbuf,0,new Float32Array([...cm.m0,...cm.m1,...cm.m2,...cm.yoff]));
      const sh=device.createShaderModule({ code:`
        struct VO{@builtin(position) p:vec4f,@location(0) uv:vec2f};
        @vertex fn vs(@builtin(vertex_index) i:u32)->VO{ var q=array<vec2f,3>(vec2f(-1,-1),vec2f(3,-1),vec2f(-1,3));
          var o:VO; o.p=vec4f(q[i],0,1); o.uv=(q[i]*vec2f(0.5,-0.5))+vec2f(0.5); return o; }
        struct CM{m0:vec4f,m1:vec4f,m2:vec4f,yoff:vec4f};
        @group(0)@binding(0) var s:sampler; @group(0)@binding(1) var tY:texture_2d<f32>;
        @group(0)@binding(2) var tU:texture_2d<f32>; @group(0)@binding(3) var tV:texture_2d<f32>;
        @group(0)@binding(4) var<uniform> cm:CM;
        @fragment fn fs(o:VO)->@location(0) vec4f{
          let y=textureSample(tY,s,o.uv).r; let u=textureSample(tU,s,o.uv).r; let w=textureSample(tV,s,o.uv).r;
          let ycc=vec3f(y,u,w)-cm.yoff.xyz;
          let rgb=vec3f(dot(cm.m0.xyz,ycc),dot(cm.m1.xyz,ycc),dot(cm.m2.xyz,ycc));
          return vec4f(clamp(rgb,vec3f(0),vec3f(1)),1.0); }` });
      pipeline=device.createRenderPipeline({ layout:'auto', vertex:{module:sh,entryPoint:'vs'},
        fragment:{module:sh,entryPoint:'fs',targets:[{format:fmt}]}, primitive:{topology:'triangle-list'} });
      bindGroup=device.createBindGroup({ layout:pipeline.getBindGroupLayout(0), entries:[
        {binding:0,resource:sampler},{binding:1,resource:tY.createView()},{binding:2,resource:tU.createView()},
        {binding:3,resource:tV.createView()},{binding:4,resource:{buffer:cbuf}} ] });
    } else if (MODE === 'external') {
      const ext = device.importExternalTexture({ source: v });
      const sh = device.createShaderModule({ code:`
        @vertex fn vs(@builtin(vertex_index) i:u32)->@builtin(position) vec4f{
          var p=array<vec2f,3>(vec2f(-1,-1),vec2f(3,-1),vec2f(-1,3)); return vec4f(p[i],0,1); }
        @group(0)@binding(0) var s:sampler; @group(0)@binding(1) var t:texture_external;
        @fragment fn fs(@builtin(position) c:vec4f)->@location(0) vec4f{
          return textureSampleBaseClampToEdge(t,s,vec2f(c.x/${W}.0,c.y/${H}.0)); }` });
      pipeline=device.createRenderPipeline({ layout:'auto', vertex:{module:sh,entryPoint:'vs'},
        fragment:{module:sh,entryPoint:'fs',targets:[{format:fmt}]}, primitive:{topology:'triangle-list'} });
      bindGroup=device.createBindGroup({ layout:pipeline.getBindGroupLayout(0),
        entries:[{binding:0,resource:sampler},{binding:1,resource:ext}] });
    } else { // copy
      const tex=device.createTexture({ size:[W,H], format:fmt,
        usage:GPUTextureUsage.TEXTURE_BINDING|GPUTextureUsage.COPY_DST|GPUTextureUsage.RENDER_ATTACHMENT });
      device.queue.copyExternalImageToTexture({source:v},{texture:tex,premultipliedAlpha:false},[W,H]);
      const sh=device.createShaderModule({ code:`
        struct VO{@builtin(position) p:vec4f,@location(0) uv:vec2f};
        @vertex fn vs(@builtin(vertex_index) i:u32)->VO{ var q=array<vec2f,3>(vec2f(-1,-1),vec2f(3,-1),vec2f(-1,3));
          var o:VO; o.p=vec4f(q[i],0,1); o.uv=(q[i]*vec2f(0.5,-0.5))+vec2f(0.5); return o; }
        @group(0)@binding(0) var s:sampler; @group(0)@binding(1) var t:texture_2d<f32>;
        @fragment fn fs(o:VO)->@location(0) vec4f{ return textureSample(t,s,o.uv); }` });
      pipeline=device.createRenderPipeline({ layout:'auto', vertex:{module:sh,entryPoint:'vs'},
        fragment:{module:sh,entryPoint:'fs',targets:[{format:fmt}]}, primitive:{topology:'triangle-list'} });
      bindGroup=device.createBindGroup({ layout:pipeline.getBindGroupLayout(0),
        entries:[{binding:0,resource:sampler},{binding:1,resource:tex.createView()}] });
    }
  } catch (e) { return done('FAIL pipeline ' + (e && e.message ? e.message : e)); }

  try {
    const enc=device.createCommandEncoder();
    const pass=enc.beginRenderPass({ colorAttachments:[{ view:target.createView(), loadOp:'clear', storeOp:'store', clearValue:{r:0,g:0,b:0,a:1} }] });
    pass.setPipeline(pipeline); pass.setBindGroup(0,bindGroup); pass.draw(3); pass.end();
    device.queue.submit([enc.finish()]);
  } catch (e) { return done('FAIL render ' + (e && e.message ? e.message : e)); }
  const gpu = await readback(device, target);

  const cc=document.createElement('canvas'); cc.width=W; cc.height=H;
  cc.getContext('2d').drawImage(v,0,0,W,H);
  const ref=cc.getContext('2d').getImageData(0,0,W,H).data;
  const dWeb=meanAbsRGB(gpu,ref);

  let oracleMsg='oracle=skip';
  try { const ob=new Uint8Array(await (await fetch('oracle.rgba')).arrayBuffer());
    if (ob.length===W*H*4){ const d=meanAbsRGB(gpu,ob); oracleMsg=`oracle_mean=${d.mean.toFixed(3)} oracle_max=${d.max}`; }
  } catch(e){ oracleMsg='oracle=fetch-fail'; }

  const verdict = dWeb.mean < 2.0 ? 'PASS' : 'FAIL';
  done(`${verdict} mode=${MODE} adapter=${info.vendor||'?'}/${info.architecture||'?'} `
     + `webgpu_vs_2d_mean=${dWeb.mean.toFixed(3)} max=${dWeb.max} ${oracleMsg} ${W}x${H}`);
}
main().catch(e => done('FAIL ' + (e && e.message ? e.message : e)));
</script></body></html>
